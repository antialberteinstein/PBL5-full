# Fine-tune Config cho ResNet50

# Model Paths
model_path: "models/pretrained/r50-ms1mv3.pth"
dataset_path: "dataset"
save_dir: "models/finetuned"

# Training Hyperparameters
batch_size: 16
epochs: 20
learning_rate: 0.0001
weight_decay: 0.0005

# LoRA Hyperparameters
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05

# ArcFace / CosFace Hyperparameters
margin: 0.5
scale: 64.0
